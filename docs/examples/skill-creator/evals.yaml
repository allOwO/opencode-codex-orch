skill_name: skill-creator
evals:
  - id: validate-basic-skill
    prompt: Review the local skill scaffold and explain whether the SKILL.md structure is valid.
    files:
      - fixtures/basic-skill/SKILL.md
    expectations:
      skill_invoked: true
      tools_any:
        - Read
      assistant_contains:
        - SKILL.md
        - frontmatter
      tools_none:
        - Write
  - id: suggest-improvements
    prompt: Inspect the sample skill and suggest two concrete description improvements without editing files.
    files:
      - fixtures/basic-skill/SKILL.md
    expectations:
      skill_invoked: true
      tools_any:
        - Read
      assistant_contains:
        - description
        - improvement
      tools_none:
        - Write
